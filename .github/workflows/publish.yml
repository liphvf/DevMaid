name: Publish NuGet

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    permissions:
      contents: write
      packages: write
      id-token: write # required for OIDC token issuance (Trusted Publishing)

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build FurLab.CLI/FurLab.CLI.csproj -c Release --no-restore

      - name: Create NuGet package
        run: dotnet pack FurLab.CLI/FurLab.CLI.csproj -c Release --no-build --no-restore

      - name: Extract version
        id: version
        run: |
          $nupkg = Get-ChildItem FurLab.CLI/bin/Release/*.nupkg | Select-Object -First 1
          $version = $nupkg.BaseName -replace '^FurLab\.CLI\.', ''
          echo "version=$version" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: NuGet login (Trusted Publishing)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish to NuGet.org
        run: dotnet nuget push FurLab.CLI/bin/Release/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}

  build-standalone:
    runs-on: windows-latest
    needs: publish
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build standalone EXE
        run: dotnet publish FurLab.CLI/FurLab.CLI.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=false -o dist

      - name: Rename EXE to FurLab.exe
        run: Rename-Item dist/FurLab.CLI.exe FurLab.exe
        shell: pwsh

      - name: Get EXE path and hash
        id: exe
        run: |
          $exePath = Get-ChildItem dist/FurLab.CLI.exe | Select-Object -First 1
          $exePath = Get-ChildItem dist/FurLab.exe | Select-Object -First 1
          $hash = (Get-FileHash $exePath.FullName -Algorithm SHA256).Hash
          echo "path=$($exePath.FullName)" >> $env:GITHUB_OUTPUT
          echo "hash=$hash" >> $env:GITHUB_OUTPUT
          echo "SHA256: $hash"
        shell: pwsh

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.publish.outputs.version }}
          files: ${{ steps.exe.outputs.path }}
          append_body: true
          body: |

            ## Standalone Windows x64 Build
            SHA256: `${{ steps.exe.outputs.hash }}`
            **SHA256**: `${{ steps.exe.outputs.hash }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
