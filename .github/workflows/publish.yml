name: Publish NuGet

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write  # required for OIDC token issuance (Trusted Publishing)

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build DevMaid.CLI/DevMaid.CLI.csproj -c Release --no-restore

      - name: Create NuGet package
        run: dotnet pack DevMaid.CLI/DevMaid.CLI.csproj -c Release --no-build --no-restore

      - name: Extract version
        id: version
        run: |
          $nupkg = Get-ChildItem DevMaid.CLI/bin/Release/*.nupkg | Select-Object -First 1
          $version = $nupkg.BaseName -replace '^DevMaid\.CLI\.', ''
          echo "version=$version" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: NuGet login (Trusted Publishing)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish to NuGet.org
        run: dotnet nuget push DevMaid.CLI/bin/Release/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
